<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:hsl(220, 75%, 55%);stop-opacity:1" />
      <stop offset="100%" style="stop-color:hsl(340, 75%, 60%);stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Central circle -->
  <circle cx="24" cy="24" r="5" fill="url(#gradient)"/>
  
  <!-- Top -->
  <circle cx="24" cy="8" r="3.5" fill="url(#gradient)"/>
  <line x1="24" y1="11.5" x2="24" y2="19" stroke="url(#gradient)" stroke-width="2"/>
  
  <!-- Top-left -->
  <circle cx="12.5" cy="12.5" r="3.5" fill="url(#gradient)"/>
