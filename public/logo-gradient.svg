  <!-- Top-right -->
  <circle cx="35.5" cy="12.5" r="3.5" fill="url(#gradient)"/>
  <line x1="33" y1="15" x2="27.5" y2="20.5" stroke="url(#gradient)" stroke-width="2"/>
  
  <!-- Bottom -->
  <circle cx="24" cy="40" r="3.5" fill="url(#gradient)"/>
  <line x1="24" y1="36.5" x2="24" y2="29" stroke="url(#gradient)" stroke-width="2"/>
  
  <!-- Bottom-left -->
  <circle cx="12.5" cy="35.5" r="3.5" fill="url(#gradient)"/>
  <line x1="15" y1="33" x2="20.5" y2="27.5" stroke="url(#gradient)" stroke-width="2"/>
  
  <!-- Bottom-right -->
  <circle cx="35.5" cy="35.5" r="3.5" fill="url(#gradient)"/>
  <line x1="33" y1="33" x2="27.5" y2="27.5" stroke="url(#gradient)" stroke-width="2"/>
</svg>
